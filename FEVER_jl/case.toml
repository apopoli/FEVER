[mesh]
file = "cable2d_axi.msh"

[materials]
# region (cellset name in gmsh) = material key or alias
cu     = "copper"
sc_in  = "semicon"
xlpe   = "xlpe"
sc_out = "semicon"
al     = "aluminum"
cover  = "cover"

[physics.thermal]
type = "steady"
exclude_domain = []  # thermal everywhere

[physics.thermal.bc]
# Standard Robin BC 
# outer = { type = "convection", h = 8.0, Tinf = 293.15 }

# BC interramento equivalente IEC 60287
outer = { type = "buried_iec60287", Tinf = 293.15, burial_depth = 1.3, rho_thermal_soil = 1.3}
axis  = { type = "symmetry" }

[physics.thermal.sources]
cu = { type = "joule_J", J = 1.22e6 }   # A/m^2 J = 1.22e6

[physics.electric]
type = "conduction" # "electrostatic" or "conduction"
exclude_domain = ["cu","sc_out","sc_in","al","cover"]

[physics.electric.conduction]
nonlinear = true             # if false -> linear conduction with σ(T,0)
sigma_model = "xlpe_exp"     # apply the exp law on XLPE

[physics.electric.bc]
xlpe_HV = { type = "dirichlet", phi = 340E3 }
xlpe_gnd = { type = "dirichlet", phi = 0.0 }
axis = { type = "symmetry"}
