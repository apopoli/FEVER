[mesh]
file = "joint_LIMES/joint_LIMES.msh"

[materials]
# region (cellset name in gmsh) = material key or alias
Cond_in = "copper"
Cond_out = "aluminum"
Insul_in_L = "xlpe"
Insul_in_R = "xlpe"
Semicon_in = "semicon"
Semicon_out = "semicon"
Insul_out = "xlpe"

[physics.thermal]
type = "steady"
exclude_domain = []  # thermal everywhere

[physics.thermal.bc]
# Standard Robin BC 
interf_joint_out = { type = "convection", h = 8.0, Tinf = 293.15 }
# BC interramento equivalente IEC 60287
# outer = { type = "buried_iec60287", Tinf = 293.15, burial_depth = 1.3, rho_thermal_soil = 1.3}
axis  = { type = "symmetry" }

[physics.thermal.sources]
Cond_in = { type = "joule_J", J = 1.22e6 }   # A/m^2 J = 1.22e6

[physics.electric]
type = "conduction" # "electrostatic" or "conduction"
exclude_domain = ["Cond_in","Cond_out","Semicon_in","Semicon_out"]

[physics.electric.conduction]
nonlinear = true             # if false -> linear conduction with σ(T,0)
sigma_model = "xlpe_exp"     # apply the exp law on XLPE

[physics.electric.bc]
interf_cond_in = { type = "dirichlet", phi = 340E3 }
interf_semicon_out = { type = "dirichlet", phi = 0.0 }
axis = { type = "symmetry"}
